name: Build NELVIS PC Doctor EXE

on:
  push:
    paths:
      - 'python/NELVIS_PC_Doctor.py'
      - '.github/workflows/build_exe.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests

      - name: Verify Python file size (must be ~83KB with embedded scripts)
        run: |
          $size = (Get-Item "python\NELVIS_PC_Doctor.py").length
          Write-Host "File size: $size bytes"
          if ($size -lt 50000) {
            Write-Error "ERROR: File too small ($size bytes). Wrong version!"
            exit 1
          }
          Write-Host "OK: File size correct ($size bytes)"
        shell: pwsh

      - name: Compile EXE with PyInstaller
        run: |
          cd python
          pyinstaller --onefile --windowed --uac-admin --name NELVIS_PC_Doctor --clean NELVIS_PC_Doctor.py
        shell: cmd

      - name: Verify EXE was created
        run: |
          $exePath = "python\dist\NELVIS_PC_Doctor.exe"
          if (Test-Path $exePath) {
            $size = (Get-Item $exePath).length
            Write-Host "SUCCESS: EXE created ($size bytes)"
          } else {
            Write-Error "ERROR: EXE not found!"
            exit 1
          }
        shell: pwsh

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: NELVIS_PC_Doctor_exe
          path: python/dist/NELVIS_PC_Doctor.exe
          retention-days: 7
